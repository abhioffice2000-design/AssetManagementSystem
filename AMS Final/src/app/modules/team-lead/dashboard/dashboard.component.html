<div class="dashboard-container">
  <div class="grid grid-3 gap-24 mb-24">
    <app-stat-card label="Team Size" [value]="teamSize" icon="groups" color="blue"></app-stat-card>
    <app-stat-card label="Team Assets" [value]="teamAssets" icon="devices" color="green"></app-stat-card>
    <app-stat-card label="Pending Approvals" [value]="pendingApprovals" icon="fact_check" color="amber"></app-stat-card>
  </div>

  <div class="card animate-slide-up">
    <div class="card-header border-0">
      <h3>Team Lead View</h3>
    </div>
    <div class="card-body">
      <p class="text-muted">This is a placeholder for the Team Lead Dashboard. Team approvals and assets would be displayed here.</p>
    </div>
  </div>
</div>

<div class="card animate-fade-in" style="max-width: 800px; margin: 0 auto;">
  <div class="card-header pb-0 border-0">
    <h3>Return Asset</h3>
    <p class="subtitle mt-8">Initiate a return request for an asset currently assigned to you.</p>
  </div>
  <div class="card-body">
    <form [formGroup]="returnForm" (ngSubmit)="onSubmit()" translate="no">
      
      <div class="form-group">
        <label>Select Asset to Return *</label>
        <select formControlName="assetId" class="form-control" (change)="onAssetSelect()">
          <option value="" disabled>Select an Asset</option>
          <option *ngFor="let asset of myAssets" [value]="asset.id">
            {{ asset.assetTag }} - {{ asset.name }} ({{ asset.category }})
          </option>
        </select>
      </div>

      <div *ngIf="selectedAsset" class="mb-24 p-24 animate-slide-up" style="background: var(--gray-50); border-radius: var(--radius-md); border: 1px solid var(--border-color);">
        <div class="grid grid-3 gap-16">
          <div>
            <p class="text-xs text-muted font-bold uppercase">Asset Tag</p>
            <p class="font-medium mt-4">{{ selectedAsset.assetTag }}</p>
          </div>
          <div>
            <p class="text-xs text-muted font-bold uppercase">Type/Category</p>
            <p class="font-medium mt-4">{{ selectedAsset.type }} - {{ selectedAsset.category }}</p>
          </div>
          <div>
            <p class="text-xs text-muted font-bold uppercase">Condition</p>
            <p class="mt-4"><app-status-badge [status]="selectedAsset.condition" [showIcon]="false"></app-status-badge></p>
          </div>
        </div>
      </div>

      <div class="form-group mt-24">
        <label>Reason for Return *</label>
        <textarea formControlName="justification" class="form-control" data-gramm="false" spellcheck="false" placeholder="E.g., No longer needed, hardware issue, project completed..." rows="4"></textarea>
      </div>

      <div class="mt-24 pt-16" style="border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px;">
        <button type="button" class="btn btn-outline" routerLink="/employee/dashboard">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="returnForm.invalid">Submit Return Request</button>
      </div>
    </form>
  </div>
</div>

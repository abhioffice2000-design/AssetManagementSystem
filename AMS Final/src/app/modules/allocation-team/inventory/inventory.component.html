<div class="p-4 bg-white rounded-lg shadow-sm">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-semibold text-gray-800">Asset Inventory</h2>
    <div class="flex gap-4">
      <div class="relative">
        <input type="text" placeholder="Search assets..." class="pl-10 pr-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        <span class="material-icons absolute left-3 top-2.5 text-gray-400">search</span>
      </div>
      <button class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 flex items-center gap-2">
        <span class="material-icons">filter_alt</span>
        Filter
      </button>
    </div>
  </div>

  <div class="overflow-x-auto shadow rounded-lg border">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Asset TAG</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Asset Name</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let asset of assets">
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{asset.assetTag}}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{asset.name}}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{asset.category}}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
              {{asset.status}}
            </span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
            <button class="text-blue-600 hover:text-blue-900 mr-2">View</button>
            <button class="text-indigo-600 hover:text-indigo-900">Track</button>
          </td>
        </tr>
        <tr *ngIf="assets.length === 0">
          <td colspan="5" class="px-6 py-10 text-center text-gray-500">
            No assets found in the inventory.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
